<body>

  <div class="container mt-5">

    </div>
    
  </div>

  <script>    

    let count = 0;
    const userImg = document.getElementById('userImg')


    const mylist= document.getElementById("myList")

   products.forEach((value, index)=>{

    mylist.innerHTML+=` <div class="col-lg-4 mt-5">

   })







    function nextBtn() {
      if(count<products.length-1){
      count++;
      userImg.src = products[count].image
      console.log(count);
      
      }

    }

    function pervious() {
      if (count > 0) {
        count--;
        userImg.src = products[count].image
      }
      // else{

      // }
    }


  </script>
