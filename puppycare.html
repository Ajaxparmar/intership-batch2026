<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
        href="//fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200;0,300;0,400;0,600;0,700;0,800;0,900;1,200;1,300;1,400;1,600;1,700;1,800;1,900&amp;display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        .container {
            width: 80%;
            margin: 0px auto;
        }
        .bg-primary{
            background-color: #f54748;
        }
        .text-primary{
            color: #f54748;
        }

        .flex {
            display: flex;
            align-items: center;
            justify-content: space-around;
            line-height: 60px;
            gap: 10px;
        }

        .bold {
            font-weight: 900;
        }

        .nav-items ul li a {
            text-decoration: none;
            font-size: 20px;
            color: black;
            font-weight: 600;
        }

        .nav-items ul li {
            list-style: none;
        }

        .form-group input {
            padding: 8px 12px;
            border-radius: 3px;
            border: none;
            background-color: white;
        }
        .form-group button{
            padding: 6px 12px;
            font-size: 16px;
            border: none;
            color: aliceblue;
            border-radius: 0px 20px 20px 0px;
        }
        .header{
            position: fixed;
            width: 100%;
            top:0;
            left: 0;
            z-index: 99;


        }
        .bg-color{
            background-color:transparent
        }
        .flex-gap-0{
            gap: 0;
        }
        .form-group .fa-moon{
            font-size: 24px;

        }
        .slider-bar{
            position: relative;
            height: 900px;
            width: 100%;
            background:url('https://wp.w3layouts.com/puppycare/wp-content/themes/puppycare/assets/images/b2.jpg') no-repeat;
            background-size: cover;


        }

        .overlay{
            position: absolute;
            width: 100%;
            height: 900px;
            background-color: rgba(0, 0, 0, 0.365);
            z-index: 0;
        }
        .d-flex{
            display: flex;
            align-items: center;
        }
.wave{
    position: absolute;
    bottom: 0;
    z-index: 99;
    width: 100%;


}
       
    </style>
</head>

<body>
    <div class="header">
        <div class="container ">
            <header class="flex bg-color">
                <div class="band-logo">
                    <h2><i class="fas fa-dog text-primary"></i> <span class="bold">Puppy</span>Care</h2>
                </div>
                <nav class="nav-items">
                    <ul class="flex">
                        <li><a href="">Home</a></li>
                        <li><a href="">About</a></li>
                        <li><a href="">Contact </a></li>
                        <li><a href="">Services</a></li>
                        <li><a href="">Login</a></li>
                    </ul>
                </nav>
                <div class="form-group flex">
                    <form class="flex flex-gap-0">
                        <input type="search" name="" id="" placeholder="Enter keywords...">
                        <button class="bg-primary">Search</button>
                    </form>
                    <i class="fa-regular fa-moon"></i>
                </div>
            </header>

        </div>
    </div>  
    <div class="slider-bar"> 
        <div class="overlay">
        </div>
        <div class="container">
            <div class="text-group">
                <p>Pets Love </p>
                <h1>
                    Make your dogs look their best</h1>
                    <button>View More</button>
               
            </div>
          
        </div>
        <div class="wave">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="#f3f4f5" fill-opacity="1" d="M0,288L48,272C96,256,192,224,288,197.3C384,171,480,149,576,165.3C672,181,768,235,864,250.7C960,267,1056,245,1152,250.7C1248,256,1344,288,1392,304L1440,320L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>
        </div>
       </div>

     


</body>

</html>
